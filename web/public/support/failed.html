<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Donation incomplete — Nerva</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex" />
  <link rel="icon" href="/favicon.ico" />
  <style>
    body{font-family:-apple-system,BlinkMacSystemFont,'Inter','Segoe UI',Roboto,sans-serif;
         background:#0a0b0d;color:#ecf0f6;margin:0;min-height:100vh;
         display:flex;align-items:center;justify-content:center;padding:24px}
    .card{max-width:520px;border:1px solid rgba(255,255,255,0.10);border-radius:16px;
          padding:40px;background:#15171c;text-align:center}
    h1{font-size:24px;margin:0 0 16px;letter-spacing:-0.02em}
    p{margin:0 0 12px;color:#a8acb4;line-height:1.6}
    .txn{font-family:ui-monospace,SFMono-Regular,monospace;font-size:12px;color:#5a6273;margin-top:24px}
    a{color:#7c9cff;text-decoration:none}
    a:hover{color:#a8bdff}
    .cta{display:inline-block;margin-top:24px;background:#7c9cff;color:#0a0b0d;
         padding:10px 20px;border-radius:8px;font-weight:600;font-size:14px}
    .cta:hover{background:#a8bdff;color:#0a0b0d}
    .ghost{display:inline-block;margin-top:8px;color:#a8acb4;font-size:13px}
  </style>
</head>
<body>
  <main class="card">
    <h1>Payment didn't go through.</h1>
    <p>No money was charged. PayU can fail for a hundred reasons — a flaky network, a bank decline, a closed wallet session.</p>
    <p>Try again, or sponsor on GitHub instead — both keep Nerva shipping.</p>
    <a class="cta" href="/support">Try again</a>
    <br />
    <a class="ghost" href="https://github.com/sponsors/piyushptiwari1" target="_blank" rel="noopener">Sponsor on GitHub instead →</a>
    <p class="txn" id="txn"></p>
  </main>
  <script>
    const params = new URLSearchParams(location.search);
    const txn = params.get("txnid");
    const status = params.get("status");
    if (txn) document.getElementById("txn").textContent =
      "Reference: " + txn + (status ? " · " + status : "");
  </script>
</body>
</html>
