name: nerva
base: core22
version: '0.1.5'
summary: The focus workspace that never forgets
description: |
  Nerva is a native desktop focus workspace built for deep work. Parallel
  timers that survive sleep and reboot, sticky markdown notes that float
  above any window, a year-long habit heatmap, and tasks with priority and
  due times. Offline-first. No telemetry. No account.

  The six things Nerva does properly:
   * Parallel focus timers - wall-clock math. Survives sleep, suspend, reboot.
   * Sticky markdown notes - pop out a note; it floats above any window.
     Autosaves every 250 ms.
   * Habit heatmap - 4-state daily toggle, streaks, full-year contribution grid.
   * Tasks with pop-out - priority + due time, dockable or floating widget.
   * Command palette - Ctrl+Space to jump anywhere. Global shortcuts.
   * Crash-safe local store - event-sourced SQLite. Append-only log.
     Replay-on-launch recovery.

  Native Rust core, ~80 MB RAM idle. Not Electron. Open source (Apache-2.0).

grade: stable
confinement: strict
license: Apache-2.0
icon: src-tauri/icons/128x128@2x.png
website: https://nerva.bytical.ai
contact: piyush@bytical.ai
issues: https://github.com/piyushptiwari1/nerva/issues
source-code: https://github.com/piyushptiwari1/nerva

architectures:
  - build-on: amd64
    build-for: amd64

apps:
  nerva:
    command: usr/bin/nerva
    desktop: usr/share/applications/nerva.desktop
    extensions:
      - gnome
    plugs:
      - home
      - network
      - desktop
      - desktop-legacy
      - wayland
      - x11
      - unity7
      - audio-playback
      - browser-support
      - removable-media
    environment:
      WEBKIT_DISABLE_DMABUF_RENDERER: 1
      WEBKIT_DISABLE_COMPOSITING_MODE: 1

parts:
  nerva:
    plugin: dump
    source: src-tauri/target/release/bundle/deb/
    source-type: local
    override-build: |
      set -eux
      # The release CI drops a single .deb into bundle/deb/ — unpack it
      DEB_FILE=$(ls *.deb | head -n1)
      dpkg-deb -x "$DEB_FILE" "$SNAPCRAFT_PART_INSTALL"
      # tauri-bundler ships the .desktop with the upstream PascalCase
      # ("Nerva.desktop"), but snapcraft's app.desktop key needs the
      # lowercase path it can find on stage. Rename in place so the
      # subsequent snapcraft "Copying snap assets" step finds it.
      DESKTOP_DIR="$SNAPCRAFT_PART_INSTALL/usr/share/applications"
      if [ -f "$DESKTOP_DIR/Nerva.desktop" ] && [ ! -f "$DESKTOP_DIR/nerva.desktop" ]; then
        mv "$DESKTOP_DIR/Nerva.desktop" "$DESKTOP_DIR/nerva.desktop"
      fi
    build-packages:
      - dpkg
    stage-packages:
      - libwebkit2gtk-4.1-0
      - libgtk-3-0
      - libayatana-appindicator3-1
      - libnotify4
      - libsqlite3-0
      - libssl3
